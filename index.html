<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Dashboard — Cobra & Speer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0a0a0a;
      --dark: #111111;
      --card: #161616;
      --border: #222222;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --white: #f5f5f5;
      --muted: #666;
      --text: #aaa;
      --green: #22c55e;
      --yellow: #eab308;
      --blue: #3b82f6;
      --red: #ef4444;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--black);
      color: var(--text);
      min-height: 100vh;
      padding: 2.5rem 2rem;
    }
    .wrap { max-width: 960px; margin: 0 auto; }

    /* Header */
    header { margin-bottom: 2.5rem; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 1rem; }
    .logo { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--white); margin-bottom: 0.4rem; }
    .logo span { color: var(--gold); }
    header h1 { font-size: 1.6rem; font-weight: 700; color: var(--white); letter-spacing: -0.02em; }
    .refreshed { font-size: 0.75rem; color: var(--muted); }

    /* Stats */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1.1rem 1.4rem; }
    .stat .label { font-size: 0.65rem; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem; }
    .stat .val { font-size: 1.9rem; font-weight: 700; color: var(--white); line-height: 1; }
    .stat .val.green { color: var(--green); }
    .stat .val.yellow { color: var(--yellow); }
    .stat .val.blue { color: var(--blue); }

    /* Table */
    .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--muted); padding: 0.9rem 1.4rem; text-align: left;
      border-bottom: 1px solid var(--border); background: var(--dark);
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.02); }
    td { padding: 1rem 1.4rem; vertical-align: middle; }
    .project-name { font-size: 0.95rem; font-weight: 600; color: var(--white); }
    .project-desc { font-size: 0.78rem; color: var(--muted); margin-top: 0.2rem; }
    .badge {
      display: inline-flex; align-items: center; gap: 0.35rem;
      padding: 0.22rem 0.6rem; border-radius: 20px;
      font-size: 0.68rem; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase;
    }
    .badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; }
    .badge-active   { background: rgba(34,197,94,0.12);  color: var(--green);  }
    .badge-active::before  { background: var(--green); }
    .badge-building { background: rgba(234,179,8,0.12);  color: var(--yellow); }
    .badge-building::before { background: var(--yellow); }
    .badge-planning { background: rgba(59,130,246,0.12); color: var(--blue);   }
    .badge-planning::before { background: var(--blue); }
    .badge-paused   { background: rgba(239,68,68,0.1);   color: var(--red);    }
    .badge-paused::before   { background: var(--red); }
    .date { font-size: 0.82rem; color: var(--text); white-space: nowrap; }
    .link a { font-size: 0.82rem; color: var(--gold); text-decoration: none; }
    .link a:hover { color: var(--gold-light); text-decoration: underline; }

    /* States */
    .loading, .error, .empty {
      text-align: center; padding: 4rem 2rem; color: var(--muted); font-size: 0.9rem;
    }
    .error { color: var(--red); }

    /* Footer */
    footer { margin-top: 2rem; text-align: center; font-size: 0.72rem; color: var(--muted); }

    @media (max-width: 600px) {
      td.link, th.link-h { display: none; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <div class="logo">Cobra <span>&</span> Speer</div>
        <h1>Project Dashboard</h1>
      </div>
      <div class="refreshed" id="refreshed"></div>
    </header>

    <div class="stats" id="stats"></div>

    <div class="table-wrap">
      <div class="loading" id="state">Loading projects…</div>
      <table id="table" style="display:none">
        <thead>
          <tr>
            <th>Project</th>
            <th>Status</th>
            <th>Last Updated</th>
            <th class="link-h">Live URL</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <footer>Managed by Rosie · Cobra & Speer Holdings LLC</footer>
  </div>

  <script>
    const SUPABASE_URL = 'https://ocuifdftzirfdiqszkax.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jdWlmZGZ0emlyZmRpcXN6a2F4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NzI0MjAsImV4cCI6MjA5MDU0ODQyMH0.TpUlB8h60C2yU_7tTtyo31CWu0qe_tf5KBvD83kthoY';

    function fmt(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function badgeClass(s) {
      const map = { active: 'active', building: 'building', planning: 'planning', paused: 'paused' };
      return 'badge badge-' + (map[s] || 'planning');
    }

    function badgeLabel(s) {
      const map = { active: 'Live', building: 'Building', planning: 'Planning', paused: 'Paused' };
      return map[s] || s;
    }

    async function load() {
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/projects?select=*&order=last_worked_on.desc`, {
          headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        // Stats
        const total = data.length;
        const live = data.filter(p => p.status === 'active').length;
        const building = data.filter(p => p.status === 'building').length;
        const planning = data.filter(p => p.status === 'planning').length;
        document.getElementById('stats').innerHTML = `
          <div class="stat"><div class="label">Total</div><div class="val">${total}</div></div>
          <div class="stat"><div class="label">Live</div><div class="val green">${live}</div></div>
          <div class="stat"><div class="label">Building</div><div class="val yellow">${building}</div></div>
          <div class="stat"><div class="label">Planning</div><div class="val blue">${planning}</div></div>
        `;

        document.getElementById('refreshed').textContent = 'Updated ' + fmt(new Date().toISOString());

        if (data.length === 0) {
          document.getElementById('state').textContent = 'No projects yet.';
          document.getElementById('state').className = 'empty';
          return;
        }

        document.getElementById('state').style.display = 'none';
        document.getElementById('table').style.display = 'table';

        document.getElementById('tbody').innerHTML = data.map(p => `
          <tr>
            <td>
              <div class="project-name">${p.name}</div>
              ${p.description ? `<div class="project-desc">${p.description}</div>` : ''}
            </td>
            <td><span class="${badgeClass(p.status)}">${badgeLabel(p.status)}</span></td>
            <td class="date">${fmt(p.last_worked_on || p.updated_at)}</td>
            <td class="link">${p.live_url ? `<a href="${p.live_url}" target="_blank" rel="noopener">${p.live_url.replace('https://', '')}</a>` : '—'}</td>
          </tr>
        `).join('');

      } catch (e) {
        document.getElementById('state').textContent = 'Failed to load projects. ' + e.message;
        document.getElementById('state').className = 'error';
      }
    }

    load();
  </script>
</body>
</html>
