<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Dashboard — Cobra & Speer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0a0a0a;
      --dark: #111111;
      --card: #161616;
      --border: #222222;
      --border-hover: #333;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --white: #f5f5f5;
      --muted: #555;
      --text: #999;
      --green: #22c55e;
      --yellow: #eab308;
      --blue: #3b82f6;
      --red: #ef4444;
      --purple: #a855f7;
    }
    body { font-family: 'Inter', sans-serif; background: var(--black); color: var(--text); min-height: 100vh; }

    /* VIEWS */
    .view { display: none; padding: 2.5rem 2rem; }
    .view.active { display: block; }
    .wrap { max-width: 960px; margin: 0 auto; }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 50;
      background: rgba(10,10,10,0.9); backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex; align-items: center; gap: 1rem;
    }
    .nav-logo { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--white); }
    .nav-logo span { color: var(--gold); }
    .nav-sep { color: var(--muted); }
    .nav-title { font-size: 0.85rem; color: var(--text); }
    .back-btn {
      margin-left: auto; font-size: 0.78rem; font-weight: 600; color: var(--text);
      background: none; border: 1px solid var(--border); border-radius: 6px;
      padding: 0.4rem 0.9rem; cursor: pointer; transition: all 0.15s; letter-spacing: 0.03em;
    }
    .back-btn:hover { border-color: var(--border-hover); color: var(--white); }

    /* HEADER */
    .page-header { margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 1rem; }
    .page-header h1 { font-size: 1.6rem; font-weight: 700; color: var(--white); letter-spacing: -0.02em; }
    .page-header p { font-size: 0.82rem; color: var(--muted); margin-top: 0.3rem; }
    .refreshed { font-size: 0.72rem; color: var(--muted); }

    /* STATS */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem 1.3rem; }
    .stat .label { font-size: 0.62rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.35rem; }
    .stat .val { font-size: 1.8rem; font-weight: 700; color: var(--white); line-height: 1; }
    .val.green { color: var(--green); } .val.yellow { color: var(--yellow); } .val.blue { color: var(--blue); }

    /* TABLE */
    .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead th { font-size: 0.62rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); padding: 0.85rem 1.4rem; text-align: left; border-bottom: 1px solid var(--border); background: var(--dark); }
    tbody tr { border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.025); }
    td { padding: 0.95rem 1.4rem; vertical-align: middle; }
    .project-name { font-size: 0.95rem; font-weight: 600; color: var(--white); }
    .project-desc { font-size: 0.76rem; color: var(--muted); margin-top: 0.2rem; }
    .date { font-size: 0.8rem; color: var(--text); white-space: nowrap; }
    .link-cell a { font-size: 0.8rem; color: var(--gold); text-decoration: none; }
    .link-cell a:hover { color: var(--gold-light); }
    .chevron { color: var(--muted); font-size: 1rem; }

    /* BADGE */
    .badge { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.2rem 0.55rem; border-radius: 20px; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; }
    .badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; }
    .badge-active   { background: rgba(34,197,94,0.12);  color: var(--green);  } .badge-active::before  { background: var(--green); }
    .badge-building { background: rgba(234,179,8,0.12);  color: var(--yellow); } .badge-building::before { background: var(--yellow); }
    .badge-planning { background: rgba(59,130,246,0.12); color: var(--blue);   } .badge-planning::before { background: var(--blue); }
    .badge-paused   { background: rgba(239,68,68,0.1);   color: var(--red);    } .badge-paused::before   { background: var(--red); }

    /* PROJECT DETAIL */
    .project-meta-bar {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 1.4rem 1.75rem; margin-bottom: 2rem;
      display: flex; align-items: center; gap: 2rem; flex-wrap: wrap;
    }
    .meta-item .meta-label { font-size: 0.62rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.25rem; }
    .meta-item .meta-val { font-size: 0.88rem; color: var(--text); }
    .meta-item .meta-val a { color: var(--gold); text-decoration: none; }
    .meta-item .meta-val a:hover { color: var(--gold-light); }

    /* TASK COLUMNS */
    .task-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem; }
    @media (max-width: 700px) { .task-board { grid-template-columns: 1fr; } }

    .task-col { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .col-header {
      padding: 0.85rem 1.2rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .col-title { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; }
    .col-count { font-size: 0.7rem; color: var(--muted); background: rgba(255,255,255,0.06); padding: 0.15rem 0.5rem; border-radius: 20px; }
    .col-todo .col-title { color: var(--text); }
    .col-in_progress .col-title { color: var(--yellow); }
    .col-done .col-title { color: var(--green); }

    .task-list { padding: 0.75rem; display: flex; flex-direction: column; gap: 0.5rem; min-height: 60px; }

    .task-item {
      background: var(--dark); border: 1px solid var(--border); border-radius: 7px;
      padding: 0.75rem 0.9rem; display: flex; align-items: flex-start; gap: 0.65rem;
      cursor: pointer; transition: border-color 0.15s;
      position: relative;
    }
    .task-item:hover { border-color: var(--border-hover); }

    .task-check {
      width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--border);
      flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .task-item.status-in_progress .task-check { border-color: var(--yellow); }
    .task-item.status-done .task-check { border-color: var(--green); background: var(--green); }
    .task-item.status-done .task-check::after { content: '✓'; font-size: 9px; color: #000; font-weight: 700; }

    .task-title { font-size: 0.85rem; color: var(--white); line-height: 1.4; flex: 1; }
    .task-item.status-done .task-title { text-decoration: line-through; color: var(--muted); }

    .task-actions {
      display: none; position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%);
      gap: 0.3rem;
    }
    .task-item:hover .task-actions { display: flex; }

    .task-btn {
      background: var(--card); border: 1px solid var(--border); border-radius: 4px;
      padding: 0.2rem 0.45rem; font-size: 0.65rem; font-weight: 600; cursor: pointer;
      color: var(--muted); transition: all 0.15s; white-space: nowrap;
    }
    .task-btn:hover { border-color: var(--gold); color: var(--gold); }
    .task-btn.danger:hover { border-color: var(--red); color: var(--red); }

    /* ADD TASK */
    .add-task-form {
      padding: 0.75rem;
      border-top: 1px solid var(--border);
      display: flex; gap: 0.5rem;
    }
    .add-task-input {
      flex: 1; background: var(--dark); border: 1px solid var(--border); border-radius: 6px;
      padding: 0.5rem 0.75rem; font-size: 0.82rem; color: var(--white); font-family: inherit;
      outline: none; transition: border-color 0.15s;
    }
    .add-task-input::placeholder { color: var(--muted); }
    .add-task-input:focus { border-color: var(--gold); }
    .add-task-btn {
      background: var(--gold); color: var(--black); border: none; border-radius: 6px;
      padding: 0.5rem 0.9rem; font-size: 0.8rem; font-weight: 700; cursor: pointer;
      transition: background 0.15s; white-space: nowrap;
    }
    .add-task-btn:hover { background: var(--gold-light); }
    .add-task-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* STATES */
    .loading, .error, .empty { text-align: center; padding: 3rem 2rem; color: var(--muted); font-size: 0.88rem; }
    .error { color: var(--red); }

    /* SPINNER */
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* NOTES */
    .notes-section {
      margin-top: 2rem;
      background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
    }
    .notes-header {
      padding: 0.85rem 1.4rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .notes-header .col-title { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text); }
    .notes-save-status { font-size: 0.7rem; color: var(--muted); transition: color 0.3s; }
    .notes-save-status.saved { color: var(--green); }
    .notes-save-status.saving { color: var(--yellow); }
    .notes-textarea {
      width: 100%; min-height: 180px; background: transparent; border: none; outline: none;
      padding: 1.2rem 1.4rem; font-family: inherit; font-size: 0.88rem; color: var(--white);
      line-height: 1.7; resize: vertical; color: var(--text);
    }
    .notes-textarea::placeholder { color: var(--muted); }
    .notes-textarea:focus { color: var(--white); }

    /* CHAT */
    .chat-toggle {
      position: fixed; bottom: 1.75rem; right: 1.75rem; z-index: 200;
      width: 54px; height: 54px; border-radius: 50%;
      background: var(--gold); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(201,168,76,0.35);
      transition: background 0.2s, transform 0.2s;
      font-size: 1.3rem;
    }
    .chat-toggle:hover { background: var(--gold-light); transform: scale(1.05); }
    .chat-toggle.open { background: #2a2a2a; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }

    .chat-panel {
      position: fixed; bottom: 5.5rem; right: 1.75rem; z-index: 199;
      width: 360px; max-width: calc(100vw - 2rem);
      background: var(--dark); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
      display: none; flex-direction: column;
      height: 500px; max-height: calc(100vh - 8rem);
    }
    .chat-panel.open { display: flex; }

    .chat-header {
      padding: 1rem 1.25rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 0.65rem;
      background: var(--card); flex-shrink: 0;
    }
    .chat-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), #a07030);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; flex-shrink: 0;
    }
    .chat-header-info .name { font-size: 0.88rem; font-weight: 600; color: var(--white); }
    .chat-header-info .status { font-size: 0.7rem; color: var(--green); display: flex; align-items: center; gap: 0.3rem; }
    .chat-header-info .status::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--green); }

    .chat-messages {
      flex: 1; overflow-y: auto; padding: 1rem;
      display: flex; flex-direction: column; gap: 0.75rem;
      scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg { display: flex; flex-direction: column; max-width: 85%; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.rosie { align-self: flex-start; align-items: flex-start; }

    .msg-bubble {
      padding: 0.6rem 0.9rem; border-radius: 12px;
      font-size: 0.85rem; line-height: 1.55; word-break: break-word;
    }
    .msg.user .msg-bubble { background: var(--gold); color: #000; border-bottom-right-radius: 3px; }
    .msg.rosie .msg-bubble { background: var(--card); color: var(--white); border-bottom-left-radius: 3px; border: 1px solid var(--border); }
    .msg-time { font-size: 0.62rem; color: var(--muted); margin-top: 0.2rem; padding: 0 0.25rem; }

    .chat-typing {
      align-self: flex-start; padding: 0.6rem 0.9rem;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; border-bottom-left-radius: 3px;
      display: none;
    }
    .chat-typing.visible { display: flex; gap: 4px; align-items: center; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }

    .chat-input-area {
      padding: 0.75rem; border-top: 1px solid var(--border);
      display: flex; gap: 0.5rem; flex-shrink: 0; background: var(--card);
    }
    .chat-input {
      flex: 1; background: var(--dark); border: 1px solid var(--border);
      border-radius: 20px; padding: 0.55rem 1rem;
      font-size: 0.85rem; color: var(--white); font-family: inherit;
      outline: none; transition: border-color 0.15s; resize: none;
      max-height: 100px; line-height: 1.4;
    }
    .chat-input::placeholder { color: var(--muted); }
    .chat-input:focus { border-color: var(--gold); }
    .chat-send {
      width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; align-self: flex-end;
      background: var(--gold); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; transition: background 0.15s;
    }
    .chat-send:hover { background: var(--gold-light); }
    .chat-send:disabled { opacity: 0.4; cursor: not-allowed; }

    footer { margin-top: 2.5rem; text-align: center; font-size: 0.7rem; color: var(--muted); padding-bottom: 2rem; }

    @media (max-width: 600px) {
      td.link-cell, th.link-h { display: none; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-logo">Cobra <span>&</span> Speer</div>
    <span class="nav-sep" id="navSep" style="display:none">›</span>
    <span class="nav-title" id="navTitle"></span>
    <button class="back-btn" id="backBtn" style="display:none" onclick="showDashboard()">← All Projects</button>
  </nav>

  <!-- DASHBOARD VIEW -->
  <div class="view active" id="viewDashboard">
    <div class="wrap">
      <div class="page-header">
        <div>
          <h1>Project Dashboard</h1>
          <p>All active projects — click to view tasks</p>
        </div>
        <div class="refreshed" id="refreshed"></div>
      </div>
      <div class="stats" id="stats"></div>
      <div class="table-wrap">
        <div class="loading" id="dashState">Loading projects…</div>
        <table id="dashTable" style="display:none">
          <thead>
            <tr>
              <th>Project</th>
              <th>Status</th>
              <th>Last Updated</th>
              <th class="link-h">Live URL</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="dashTbody"></tbody>
        </table>
      </div>
      <footer>Managed by Rosie · Cobra & Speer Holdings LLC</footer>
    </div>
  </div>

  <!-- PROJECT DETAIL VIEW -->
  <div class="view" id="viewDetail">
    <div class="wrap">
      <div class="page-header">
        <div>
          <h1 id="detailName"></h1>
          <p id="detailDesc"></p>
        </div>
        <span id="detailBadge"></span>
      </div>
      <div class="project-meta-bar" id="detailMeta"></div>
      <div id="taskBoard" class="task-board"></div>

      <div class="notes-section" id="notesSection">
        <div class="notes-header">
          <span class="col-title">📝 Notes</span>
          <span class="notes-save-status" id="notesSaveStatus"></span>
        </div>
        <textarea class="notes-textarea" id="notesTextarea" placeholder="Write project notes here… auto-saves as you type."></textarea>
      </div>

      <footer>Managed by Rosie · Cobra & Speer Holdings LLC</footer>
    </div>
  </div>

  <!-- CHAT WIDGET -->
  <button class="chat-toggle" id="chatToggle" onclick="toggleChat()" title="Chat with Rosie">🤖</button>

  <div class="chat-panel" id="chatPanel">
    <div class="chat-header">
      <div class="chat-avatar">🤖</div>
      <div class="chat-header-info">
        <div class="name">Rosie</div>
        <div class="status">Online</div>
      </div>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="msg rosie">
        <div class="msg-bubble">Hey John! I'm here. What do you need?</div>
        <div class="msg-time">Rosie</div>
      </div>
    </div>
    <div class="chat-typing" id="chatTyping"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    <div class="chat-input-area">
      <textarea class="chat-input" id="chatInput" placeholder="Message Rosie…" rows="1" onkeydown="chatKeydown(event)"></textarea>
      <button class="chat-send" id="chatSend" onclick="sendMessage()">➤</button>
    </div>
  </div>

  <script>
    const SB_URL  = 'https://ocuifdftzirfdiqszkax.supabase.co';
    const SB_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jdWlmZGZ0emlyZmRpcXN6a2F4Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NDk3MjQyMCwiZXhwIjoyMDkwNTQ4NDIwfQ.273Rr2OIP49-KtuYZDsctkFG96T4pcFa7RuMpiW934g';

    const headers = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

    // ── API helpers ────────────────────────────────────────────────────────────
    async function api(method, path, body) {
      const res = await fetch(SB_URL + '/rest/v1/' + path, { method, headers, body: body ? JSON.stringify(body) : undefined });
      if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.message || res.status); }
      const text = await res.text();
      return text ? JSON.parse(text) : null;
    }
    const GET    = p        => api('GET', p);
    const POST   = (p, b)   => api('POST', p, b);
    const PATCH  = (p, b)   => api('PATCH', p, b);
    const DELETE = p        => api('DELETE', p);

    // ── Formatting ─────────────────────────────────────────────────────────────
    function fmt(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function badgeHtml(status) {
      const labels = { active: 'Live', building: 'Building', planning: 'Planning', paused: 'Paused' };
      const cls    = { active: 'active', building: 'building', planning: 'planning', paused: 'paused' };
      return `<span class="badge badge-${cls[status] || 'planning'}">${labels[status] || status}</span>`;
    }

    // ── State ─────────────────────────────────────────────────────────────────
    let currentProject = null;
    let allTasks = [];

    // ── Dashboard ─────────────────────────────────────────────────────────────
    async function showDashboard() {
      document.getElementById('viewDashboard').classList.add('active');
      document.getElementById('viewDetail').classList.remove('active');
      document.getElementById('backBtn').style.display = 'none';
      document.getElementById('navSep').style.display = 'none';
      document.getElementById('navTitle').textContent = '';
      currentProject = null;
      await loadDashboard();
    }

    async function loadDashboard() {
      document.getElementById('dashState').style.display = 'block';
      document.getElementById('dashTable').style.display = 'none';
      try {
        const data = await GET('projects?select=*&order=last_worked_on.desc');
        renderDashboard(data);
      } catch (e) {
        document.getElementById('dashState').textContent = 'Failed to load: ' + e.message;
        document.getElementById('dashState').className = 'error';
      }
    }

    function renderDashboard(data) {
      const total    = data.length;
      const live     = data.filter(p => p.status === 'active').length;
      const building = data.filter(p => p.status === 'building').length;
      const planning = data.filter(p => p.status === 'planning').length;

      document.getElementById('stats').innerHTML = `
        <div class="stat"><div class="label">Total</div><div class="val">${total}</div></div>
        <div class="stat"><div class="label">Live</div><div class="val green">${live}</div></div>
        <div class="stat"><div class="label">Building</div><div class="val yellow">${building}</div></div>
        <div class="stat"><div class="label">Planning</div><div class="val blue">${planning}</div></div>
      `;
      document.getElementById('refreshed').textContent = 'Updated ' + fmt(new Date().toISOString());

      if (!data.length) {
        document.getElementById('dashState').textContent = 'No projects yet.';
        document.getElementById('dashState').className = 'empty';
        return;
      }

      document.getElementById('dashState').style.display = 'none';
      document.getElementById('dashTable').style.display = 'table';

      document.getElementById('dashTbody').innerHTML = data.map(p => `
        <tr onclick="openProject('${p.id}')">
          <td>
            <div class="project-name">${esc(p.name)}</div>
            ${p.description ? `<div class="project-desc">${esc(p.description)}</div>` : ''}
          </td>
          <td>${badgeHtml(p.status)}</td>
          <td class="date">${fmt(p.last_worked_on || p.updated_at)}</td>
          <td class="link-cell">${p.live_url ? `<a href="${p.live_url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${p.live_url.replace('https://','')}</a>` : '—'}</td>
          <td class="chevron">›</td>
        </tr>
      `).join('');
    }

    // ── Project Detail ─────────────────────────────────────────────────────────
    async function openProject(id) {
      document.getElementById('viewDashboard').classList.remove('active');
      document.getElementById('viewDetail').classList.add('active');
      document.getElementById('backBtn').style.display = 'flex';
      document.getElementById('navSep').style.display = 'inline';

      document.getElementById('taskBoard').innerHTML = '<div class="loading">Loading tasks…</div>';

      try {
        const projects = await GET(`projects?id=eq.${id}&select=*`);
        const project = projects[0];
        currentProject = project;

        document.getElementById('navTitle').textContent = project.name;
        document.getElementById('detailName').textContent = project.name;
        document.getElementById('detailDesc').textContent = project.description || '';
        document.getElementById('detailBadge').innerHTML = badgeHtml(project.status);

        const metas = [];
        if (project.last_worked_on) metas.push({ label: 'Last Updated', val: fmt(project.last_worked_on) });
        if (project.live_url)       metas.push({ label: 'Live URL',     val: `<a href="${project.live_url}" target="_blank" rel="noopener">${project.live_url}</a>` });
        if (project.repo_url)       metas.push({ label: 'Repo',         val: `<a href="${project.repo_url}" target="_blank" rel="noopener">${project.repo_url.replace('https://github.com/','')}</a>` });
        document.getElementById('detailMeta').innerHTML = metas.map(m =>
          `<div class="meta-item"><div class="meta-label">${m.label}</div><div class="meta-val">${m.val}</div></div>`
        ).join('');

        await loadTasks(id);
        await loadNotes(id);
      } catch (e) {
        document.getElementById('taskBoard').innerHTML = `<div class="error">Failed to load project: ${e.message}</div>`;
      }
    }

    async function loadTasks(projectId) {
      try {
        allTasks = await GET(`tasks?project_id=eq.${projectId}&select=*&order=created_at.asc`);
        renderTaskBoard();
      } catch (e) {
        document.getElementById('taskBoard').innerHTML = `<div class="error">Failed to load tasks: ${e.message}</div>`;
      }
    }

    function renderTaskBoard() {
      const cols = [
        { key: 'todo',        label: 'To Do',       cls: 'col-todo' },
        { key: 'in_progress', label: 'In Progress',  cls: 'col-in_progress' },
        { key: 'done',        label: 'Done',          cls: 'col-done' },
      ];

      document.getElementById('taskBoard').innerHTML = cols.map(col => {
        const tasks = allTasks.filter(t => t.status === col.key);
        return `
          <div class="task-col ${col.cls}">
            <div class="col-header">
              <span class="col-title">${col.label}</span>
              <span class="col-count">${tasks.length}</span>
            </div>
            <div class="task-list" id="col-${col.key}">
              ${tasks.map(t => taskHtml(t)).join('') || '<div class="empty" style="padding:1rem;font-size:0.8rem;">Empty</div>'}
            </div>
            <div class="add-task-form">
              <input class="add-task-input" id="input-${col.key}" type="text" placeholder="Add task…" onkeydown="if(event.key==='Enter') addTask('${col.key}')">
              <button class="add-task-btn" onclick="addTask('${col.key}')">+</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function taskHtml(t) {
      const nextStatus = { todo: 'in_progress', in_progress: 'done', done: 'todo' };
      const nextLabel  = { todo: '→ Start', in_progress: '→ Done', done: '↺ Reopen' };
      return `
        <div class="task-item status-${t.status}" id="task-${t.id}" onclick="cycleStatus('${t.id}')">
          <div class="task-check"></div>
          <span class="task-title">${esc(t.title)}</span>
          <div class="task-actions" onclick="event.stopPropagation()">
            <button class="task-btn" onclick="moveTask('${t.id}','${nextStatus[t.status]}')">${nextLabel[t.status]}</button>
            <button class="task-btn danger" onclick="deleteTask('${t.id}')">✕</button>
          </div>
        </div>
      `;
    }

    async function addTask(status) {
      const input = document.getElementById(`input-${status}`);
      const title = input.value.trim();
      if (!title) return;
      input.value = '';
      input.disabled = true;

      try {
        const [task] = await POST('tasks', { project_id: currentProject.id, title, status });
        allTasks.push(task);
        renderTaskBoard();
        document.getElementById(`input-${status}`).focus();
      } catch (e) {
        alert('Failed to add task: ' + e.message);
        input.disabled = false;
      }
    }

    async function cycleStatus(taskId) {
      const next = { todo: 'in_progress', in_progress: 'done', done: 'todo' };
      const task = allTasks.find(t => t.id === taskId);
      if (!task) return;
      await moveTask(taskId, next[task.status]);
    }

    async function moveTask(taskId, newStatus) {
      try {
        await PATCH(`tasks?id=eq.${taskId}`, { status: newStatus, updated_at: new Date().toISOString() });
        const task = allTasks.find(t => t.id === taskId);
        if (task) task.status = newStatus;
        renderTaskBoard();
      } catch (e) {
        alert('Failed to update task: ' + e.message);
      }
    }

    async function deleteTask(taskId) {
      if (!confirm('Delete this task?')) return;
      try {
        await DELETE(`tasks?id=eq.${taskId}`);
        allTasks = allTasks.filter(t => t.id !== taskId);
        renderTaskBoard();
      } catch (e) {
        alert('Failed to delete task: ' + e.message);
      }
    }

    function esc(s) {
      if (!s) return '';
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Notes ─────────────────────────────────────────────────────────────────
    let notesDebounce = null;
    let currentNoteId = null;

    async function loadNotes(projectId) {
      const textarea = document.getElementById('notesTextarea');
      const status   = document.getElementById('notesSaveStatus');
      textarea.value = '';
      status.textContent = '';
      currentNoteId = null;

      try {
        const rows = await GET(`notes?project_id=eq.${projectId}&order=created_at.asc&limit=1`);
        if (rows && rows.length > 0) {
          currentNoteId = rows[0].id;
          textarea.value = rows[0].content || '';
        }
      } catch (e) {
        console.error('Failed to load notes', e);
      }

      textarea.oninput = () => {
        const status = document.getElementById('notesSaveStatus');
        status.textContent = 'Saving…';
        status.className = 'notes-save-status saving';
        clearTimeout(notesDebounce);
        notesDebounce = setTimeout(() => saveNotes(projectId), 1000);
      };
    }

    async function saveNotes(projectId) {
      const textarea = document.getElementById('notesTextarea');
      const status   = document.getElementById('notesSaveStatus');
      const content  = textarea.value;

      try {
        if (currentNoteId) {
          await PATCH(`notes?id=eq.${currentNoteId}`, { content, updated_at: new Date().toISOString() });
        } else {
          const [row] = await POST('notes', { project_id: projectId, content });
          currentNoteId = row.id;
        }
        status.textContent = 'Saved ✓';
        status.className = 'notes-save-status saved';
        setTimeout(() => { status.textContent = ''; status.className = 'notes-save-status'; }, 2000);
      } catch (e) {
        status.textContent = 'Save failed';
        status.className = 'notes-save-status';
        console.error('Notes save error', e);
      }
    }

    // ── Chat ─────────────────────────────────────────────────────────────────
    const CHAT_API  = 'https://api.cobraspeer.com/chat';
    const CHAT_KEY  = '39ca3341d00b91a1c53ffbb89724d62bc03e1db7e13ba877cadda8f0a8ed6f30';
    let chatOpen = false;

    function toggleChat() {
      chatOpen = !chatOpen;
      document.getElementById('chatPanel').classList.toggle('open', chatOpen);
      document.getElementById('chatToggle').classList.toggle('open', chatOpen);
      document.getElementById('chatToggle').textContent = chatOpen ? '✕' : '🤖';
      if (chatOpen) {
        document.getElementById('chatInput').focus();
        scrollChat();
      }
    }

    function chatKeydown(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function scrollChat() {
      const el = document.getElementById('chatMessages');
      el.scrollTop = el.scrollHeight;
    }

    function nowTime() {
      return new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    }

    function appendMsg(role, text) {
      const msgs = document.getElementById('chatMessages');
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      // Preserve newlines
      const escaped = esc(text).replace(/\n/g, '<br>');
      div.innerHTML = `<div class="msg-bubble">${escaped}</div><div class="msg-time">${role === 'user' ? 'You' : 'Rosie'} · ${nowTime()}</div>`;
      msgs.appendChild(div);
      scrollChat();
    }

    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const send  = document.getElementById('chatSend');
      const msg   = input.value.trim();
      if (!msg) return;

      input.value = '';
      input.style.height = 'auto';
      appendMsg('user', msg);
      send.disabled = true;

      // Show typing indicator
      const typing = document.getElementById('chatTyping');
      typing.classList.add('visible');
      scrollChat();

      try {
        const res = await fetch(CHAT_API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${CHAT_KEY}` },
          body: JSON.stringify({ message: msg })
        });
        const data = await res.json();
        typing.classList.remove('visible');
        appendMsg('rosie', data.reply || data.error || 'No response.');
      } catch (e) {
        typing.classList.remove('visible');
        appendMsg('rosie', 'Connection error — try again.');
      } finally {
        send.disabled = false;
        input.focus();
      }
    }

    // Auto-resize textarea
    document.addEventListener('DOMContentLoaded', () => {
      const input = document.getElementById('chatInput');
      if (input) {
        input.addEventListener('input', () => {
          input.style.height = 'auto';
          input.style.height = Math.min(input.scrollHeight, 100) + 'px';
        });
      }
    });

    // ── Init ──────────────────────────────────────────────────────────────────
    showDashboard();
  </script>
</body>
</html>
